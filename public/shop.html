<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>松乃木飯店 店舗受付</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #1e3c72; height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-size: 14px; }
        header { background: #8b0000; color: white; padding: 8px; text-align: center; flex-shrink: 0; }
        
        .main-container { flex: 1; display: flex; overflow: hidden; }
        
        /* 左：入力（非常にコンパクト） */
        .left-panel { width: 140px; background: white; padding: 8px; border-right: 2px solid #8b0000; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-shrink: 0; }
        .input-box { background: #f5f5f5; padding: 4px; border-radius: 4px; }
        input { width: 100%; padding: 6px; font-size: 0.9em; border: 1px solid #ccc; border-radius: 4px; margin-top: 2px; }
        .num-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .btn-step { width: 24px; height: 24px; font-size: 1.2em; border-radius: 4px; border: 1px solid #999; background: white; }
        .num-val { font-weight: bold; font-size: 1.1em; }
        
        .btn-seat-sm { width: 100%; padding: 6px 2px; font-size: 0.75em; margin-bottom: 2px; border-radius: 4px; border: 1px solid #d4b483; background: white; font-weight: bold; }
        .btn-seat-sm.selected { background: #8b0000; color: white; }
        
        .btn-submit { background: #8b0000; color: white; border: none; padding: 12px 2px; font-size: 1em; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* 右：リスト */
        .right-panel { flex: 1; padding: 8px; background: #fff; overflow-y: auto; }
        .q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
        .q-card { border: 2px solid #d4b483; border-radius: 8px; padding: 6px; text-align: center; font-size: 0.8em; position: relative; }
        .q-card.arrived { border-color: #27ae60; background: #e8f5e9; }
        .q-card.web { border-style: dashed; }
        .badge-arrival { position: absolute; top: 0; right: 0; background: #27ae60; color: white; font-size: 0.7em; padding: 1px 3px; border-radius: 0 6px 0 6px; }
        
        #ticketPop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; }
        .ticket-box { background: white; padding: 20px; border-radius: 15px; text-align: center; width: 80%; }
    </style>
</head>
<body>
    <header><h1 style="font-size:1.1em;">松乃木飯店 店舗受付</h1></header>
    <div class="main-container">
        <div class="left-panel">
            <div class="input-box"><label style="font-size:0.7em;">📝 名前</label><input type="text" id="nameInput"></div>
            <div class="input-box"><label style="font-size:0.7em;">⏰ 到着予定</label><input type="time" id="targetTimeInput" step="600"></div>
            <div class="input-box">
                <div class="num-row"><span>大人:</span><button class="btn-step" onclick="changeNum('adults',-1)">-</button><span id="display-adults" class="num-val">2</span><button class="btn-step" onclick="changeNum('adults',1)">+</button></div>
                <div class="num-row"><span>子供:</span><button class="btn-step" onclick="changeNum('children',-1)">-</button><span id="display-children" class="num-val">0</span><button class="btn-step" onclick="changeNum('children',1)">+</button></div>
                <div class="num-row"><span>幼児:</span><button class="btn-step" onclick="changeNum('infants',-1)">-</button><span id="display-infants" class="num-val">0</span><button class="btn-step" onclick="changeNum('infants',1)">+</button></div>
            </div>
            <div id="seats">
                <button class="btn-seat-sm selected" onclick="selectSeat('どこでも')">どこでも</button>
                <button class="btn-seat-sm" onclick="selectSeat('カウンター')">カウンター</button>
                <button class="btn-seat-sm" onclick="selectSeat('テーブル')">テーブル</button>
                <button class="btn-seat-sm" onclick="selectSeat('お座敷')">お座敷</button>
            </div>
            <button class="btn-submit" onclick="send()">確定発券</button>
        </div>
        <div class="right-panel">
            <p style="font-size:0.8em; font-weight:bold; margin-bottom:5px;">📱 ネット予約(タップで到着) / 🏪 店舗</p>
            <div id="qList" class="q-grid"></div>
        </div>
    </div>
    <div id="ticketPop"><div class="ticket-box"><h2 style="color:#27ae60;">受付完了</h2><div id="popNum" style="font-size:4em; font-weight:bold; color:#8b0000;">--</div><p>券をお取りください</p></div></div>
    <script>
        const socket = io();
        let nums = { adults: 2, children: 0, infants: 0 }, selectedSeat = 'どこでも';
        function updateDisplays() { document.getElementById('display-adults').innerText = nums.adults; document.getElementById('display-children').innerText = nums.children; document.getElementById('display-infants').innerText = nums.infants; }
        function changeNum(k, s) { nums[k] = Math.max(k==='adults'?1:0, nums[k]+s); updateDisplays(); }
        function selectSeat(s) { selectedSeat = s; document.querySelectorAll('.btn-seat-sm').forEach(b => b.classList.toggle('selected', b.innerText === s)); }
        socket.on('init', d => updateQueue(d));
        socket.on('update', d => updateQueue(d));
        function updateQueue(d) {
            document.getElementById('qList').innerHTML = d.queue.map(g => `<div class="q-card ${g.arrived?'arrived':''} ${g.type==='web'?'web':''}" onclick="markArrived('${g.displayId}',${g.arrived})">
                ${g.arrived?'<span class="badge-arrival">済</span>':''}
                <b>${g.displayId}</b><br>${g.name||''}<br>${g.targetTime||'🕐'+g.time}
            </div>`).join('');
        }
        function markArrived(id, arrived) { if (!arrived) socket.emit('markArrived', { displayId: id }); }
        function send() { socket.emit('register', { type: 'shop', ...nums, pref: selectedSeat, name: document.getElementById('nameInput').value.trim(), targetTime: document.getElementById('targetTimeInput').value }); }
        socket.on('registered', g => {
            if (g.type === 'shop') {
                document.getElementById('popNum').innerText = g.displayId;
                document.getElementById('ticketPop').style.display = 'flex';
                setTimeout(() => { document.getElementById('ticketPop').style.display = 'none'; document.getElementById('nameInput').value = ''; document.getElementById('targetTimeInput').value = ''; nums={adults:2,children:0,infants:0}; updateDisplays(); }, 3000);
            }
        });
    </script>
</body>
</html>
