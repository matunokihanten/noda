<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>松乃木飯店 店舗受付</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #1e3c72; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #8b0000; padding: 15px; text-align: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .left-panel { width: 450px; background: white; color: black; padding: 20px; border-right: 5px solid #8b0000; }
        .right-panel { flex: 1; padding: 20px; background: rgba(255,255,255,0.9); color: black; overflow-y: auto; }
        .btn-submit { background: #8b0000; color: white; border: none; padding: 20px; width: 100%; font-size: 1.5em; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .queue-card { background: white; border: 3px solid #d4b483; border-radius: 12px; padding: 15px; text-align: center; margin: 5px; cursor: pointer; }
        .queue-card.arrived { border-color: #27ae60; background: #d4edda; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    </style>
</head>
<body>
    <header><h1>🏪 松乃木飯店 店舗受付</h1></header>
    <div class="main-container">
        <div class="left-panel">
            <h2>👥 店頭受付</h2>
            <div style="margin:30px 0; text-align:center;">
                <span style="font-weight:bold;">大人人数：</span>
                <button onclick="changeNum('adults', -1)" style="padding:15px 25px;">-</button>
                <span id="display-adults" style="font-size:2.5em; margin:0 20px;">2</span>
                <button onclick="changeNum('adults', 1)" style="padding:15px 25px;">+</button>
            </div>
            <button class="btn-submit" onclick="send()">✓ 受付確定 (発券)</button>
            <div id="ticketArea" style="display:none; text-align:center; margin-top:20px; padding:20px; border:4px solid #8b0000;">
                <h2 style="color:#27ae60;">受付完了！</h2>
                <div id="num" style="font-size:4em; font-weight:bold; color:#8b0000;">--</div>
                <p>券をお取りください</p>
            </div>
        </div>
        <div class="right-panel">
            <h3>📱 ネット予約の方 (タップして到着)</h3>
            <div id="queueListWeb" class="grid-container"></div>
            <hr style="margin:20px 0;">
            <h3>🏪 店舗待ち状況</h3>
            <div id="queueListShop" class="grid-container"></div>
        </div>
    </div>
    <script>
        const socket = io();
        let nums = { adults: 2, children: 0, infants: 0 };

        function changeNum(k, s) { nums[k] = Math.max(k==='adults'?1:0, nums[k]+s); document.getElementById('display-'+k).innerText = nums[k]; }
        socket.on('init', d => updateQueue(d));
        socket.on('update', d => updateQueue(d));

        function updateQueue(d) {
            const render = (g) => `<div class="queue-card ${g.arrived?'arrived':''}" onclick="markArrived('${g.displayId}', ${g.arrived})">
                <span style="font-weight:bold; font-size:1.8em; color:#8b0000;">${g.displayId}</span><br>
                <span>${g.adults}名 / ${g.pref}</span><br>
                <span style="font-size:0.8em; color:#666;">${g.targetTime?'予定:'+g.targetTime:''}</span>
                ${g.arrived?'<div style="color:#27ae60;font-weight:bold;">到着済</div>':''}
            </div>`;
            document.getElementById('queueListWeb').innerHTML = d.queue.filter(g => g.type === 'web').map(render).join('');
            document.getElementById('queueListShop').innerHTML = d.queue.filter(g => g.type === 'shop').map(render).join('');
        }

        // 🌟 修正点：確認窓なしで到着処理（サーバー側で発券されます）
        function markArrived(id, arrived) {
            if (arrived) return;
            socket.emit('markArrived', { displayId: id });
        }

        // 🌟 修正点：確認窓なしで受付
        function send() {
            socket.emit('register', { type: 'shop', ...nums, pref: 'どこでも' });
        }

        socket.on('registered', g => {
            if (g.type === 'shop') {
                document.getElementById('num').innerText = g.displayId;
                document.getElementById('ticketArea').style.display = 'block';
                setTimeout(() => { document.getElementById('ticketArea').style.display = 'none'; }, 4000);
            }
        });
    </script>
</body>
</html>
