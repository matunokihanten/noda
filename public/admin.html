<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>松乃木飯店 店舗受付</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #1e3c72; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #8b0000; padding: 15px; text-align: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .left-panel { width: 450px; background: white; color: black; padding: 20px; border-right: 5px solid #8b0000; overflow-y: auto; }
        .btn-submit { background: #8b0000; color: white; border: none; padding: 20px; width: 100%; font-size: 1.5em; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .num-display { font-size: 2.2em; font-weight: bold; min-width: 60px; text-align: center; color: #8b0000; }
        .btn-step { background: #f5f5f5; border: 2px solid #ccc; width: 45px; height: 45px; border-radius: 50%; font-size: 1.8em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-seat { background: #fff; border: 2px solid #d4b483; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-seat.selected { background: #8b0000; color: white; }
        .queue-card { background: white; border: 3px solid #d4b483; border-radius: 12px; padding: 12px; text-align: center; margin: 5px; cursor: pointer; transition: 0.2s; }
        .queue-card.arrived { border-color: #27ae60; background: #d4edda; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
    </style>
</head>
<body>
    <header><h1>🏪 松乃木飯店 店舗受付</h1></header>
    <div class="main-container">
        <div class="left-panel">
            <h2 style="text-align:center; color:#8b0000; margin-bottom:15px;">👥 店頭受付</h2>
            
            <div style="margin-bottom:15px; text-align:center; border-bottom:1px solid #eee; padding-bottom:15px;">
                <label style="font-weight:bold;">大人人数：</label><br>
                <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-top:5px;">
                    <button class="btn-step" onclick="changeNum('adults', -1)">-</button>
                    <span id="display-adults" class="num-display">2</span>
                    <button class="btn-step" onclick="changeNum('adults', 1)">+</button>
                </div>
            </div>

            <div style="margin-bottom:15px; text-align:center; border-bottom:1px solid #eee; padding-bottom:15px;">
                <label style="font-weight:bold;">子供 (小学生以下)：</label><br>
                <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-top:5px;">
                    <button class="btn-step" style="width:40px; height:40px;" onclick="changeNum('children', -1)">-</button>
                    <span id="display-children" style="font-size:1.8em; font-weight:bold; min-width:40px;">0</span>
                    <button class="btn-step" style="width:40px; height:40px;" onclick="changeNum('children', 1)">+</button>
                </div>
            </div>

            <div style="margin-bottom:15px; text-align:center; border-bottom:1px solid #eee; padding-bottom:15px;">
                <label style="font-weight:bold;">幼児 (未就学児)：</label><br>
                <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-top:5px;">
                    <button class="btn-step" style="width:40px; height:40px;" onclick="changeNum('infants', -1)">-</button>
                    <span id="display-infants" style="font-size:1.8em; font-weight:bold; min-width:40px;">0</span>
                    <button class="btn-step" style="width:40px; height:40px;" onclick="changeNum('infants', 1)">+</button>
                </div>
            </div>

            <label style="font-weight:bold;">座席希望：</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;">
                <button class="btn-seat selected" onclick="selectSeat('どこでも')">どこでも</button>
                <button class="btn-seat" onclick="selectSeat('カウンター')">カウンター</button>
                <button class="btn-seat" onclick="selectSeat('テーブル')">テーブル</button>
                <button class="btn-seat" onclick="selectSeat('お座敷')">お座敷</button>
            </div>
            <button class="btn-submit" onclick="send()">✓ 受付確定 (発券)</button>
            <div id="ticketArea" style="display:none; text-align:center; margin-top:20px; padding:20px; border:4px solid #8b0000; border-radius:15px;">
                <h2 style="color:#27ae60;">受付完了！</h2>
                <div id="num" style="font-size:4em; font-weight:bold; color:#8b0000;">--</div>
            </div>
        </div>
        <div class="right-panel" style="flex:1; padding:20px; background:rgba(255,255,255,0.9); color:black; overflow-y:auto;">
            <h3>📱 ネット予約の方 (タップして到着)</h3>
            <div id="queueListWeb" class="grid-container"></div>
            <hr style="margin:20px 0; border:1px solid #ccc;">
            <h3>🏪 店舗待ち状況</h3>
            <div id="queueListShop" class="grid-container"></div>
        </div>
    </div>
    <script>
        const socket = io();
        let nums = { adults: 2, children: 0, infants: 0 }, selectedSeat = 'どこでも';
        function updateDisplays() { document.getElementById('display-adults').innerText = nums.adults; document.getElementById('display-children').innerText = nums.children; document.getElementById('display-infants').innerText = nums.infants; }
        function changeNum(k, s) { nums[k] = Math.max(k==='adults'?1:0, nums[k]+s); updateDisplays(); }
        function selectSeat(s) { selectedSeat = s; document.querySelectorAll('.btn-seat').forEach(b => b.classList.toggle('selected', b.innerText === s)); }
        socket.on('init', d => updateQueue(d));
        socket.on('update', d => updateQueue(d));
        function updateQueue(d) {
            const render = (g) => `<div class="queue-card ${g.arrived?'arrived':''}" onclick="markArrived('${g.displayId}', ${g.arrived})">
                <span style="font-weight:bold; font-size:1.6em; color:#8b0000;">${g.displayId}</span><br>
                <span>${g.adults+g.children+g.infants}名 / ${g.pref}</span><br>
                <span style="font-size:0.8em; color:#666;">${g.targetTime?'予定:'+g.targetTime:'🕐'+g.time}</span>
            </div>`;
            document.getElementById('queueListWeb').innerHTML = d.queue.filter(g => g.type === 'web').map(render).join('');
            document.getElementById('queueListShop').innerHTML = d.queue.filter(g => g.type === 'shop').map(render).join('');
        }
        function markArrived(id, arrived) { if (arrived) return; socket.emit('markArrived', { displayId: id }); }
        function send() { socket.emit('register', { type: 'shop', ...nums, pref: selectedSeat }); }
        socket.on('registered', g => {
            if (g.type === 'shop') {
                document.getElementById('num').innerText = g.displayId;
                document.getElementById('ticketArea').style.display = 'block';
                setTimeout(() => { document.getElementById('ticketArea').style.display = 'none'; }, 4000);
            }
        });
    </script>
</body>
</html>
