<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>松乃木飯店 管理画面</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        .stat-value { font-size: 2.2em; font-weight: bold; color: #8b0000; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .admin-card { background: #fff; border: 2px solid #ddd; border-radius: 12px; padding: 15px; position: relative; }
        .admin-card.called { border-color: #e67e22; background: #fffbeb; }
        .arrival-badge { background: #d35400; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.9em; position: absolute; top: 10px; right: 10px; font-weight: bold; }
        button { cursor: pointer; padding: 10px; border-radius: 8px; border: none; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-call { background: #e67e22; color: white; }
        .btn-complete { background: #2ecc71; color: white; }
        .setting-control { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header"><h1>🏮 松乃木飯店 管理画面</h1><div id="clock" style="font-size:1.5em; font-weight:bold;">00:00:00</div></div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="qCount">0</div><div>待ち</div></div>
        <div class="stat-card"><div class="stat-value" id="webToday">0</div><div style="color:#9b59b6; font-size:0.8em; font-weight:bold;">ネット受付</div></div>
        <div class="stat-card"><div class="stat-value" id="shopToday">0</div><div style="color:#3498db; font-size:0.8em; font-weight:bold;">店舗受付</div></div>
        <div class="stat-card"><div class="stat-value" id="allToday">0</div><div>本日合計</div></div>
        <div class="stat-card"><div class="stat-value" id="doneToday">0</div><div>案内完了</div></div>
        <div class="stat-card"><div class="stat-value" id="avgWait">0</div><div>平均待ち(分)</div></div>
    </div>
    <div class="setting-control">
        <label style="font-weight:bold;">🔔 通知音 (MP3): </label><input type="checkbox" id="soundOn" checked style="width:25px; height:25px;">
    </div>
    <div class="admin-grid" id="list"></div>
    <script>
        const socket = io();
        let lastLen = 0, audio = null;
        socket.on('init', d => updateUI(d));
        socket.on('update', d => {
            if (d.queue.length > lastLen && document.getElementById('soundOn').checked) playSound();
            lastLen = d.queue.length; updateUI(d);
        });
        function updateUI(d) {
            document.getElementById('qCount').innerText = d.queue.length;
            document.getElementById('webToday').innerText = d.stats.totalWebToday || 0;
            document.getElementById('shopToday').innerText = d.stats.totalShopToday || 0;
            document.getElementById('allToday').innerText = d.stats.totalToday;
            document.getElementById('doneToday').innerText = d.stats.completedToday;
            document.getElementById('avgWait').innerText = d.stats.averageWaitTime || 0;
            const list = document.getElementById('list');
            list.innerHTML = d.queue.map(g => `<div class="admin-card ${g.called?'called':''}">
                <div class="arrival-badge">${g.targetTime?'⏰予定 '+g.targetTime:'🕒すぐ来店'}</div>
                <div style="font-size:1.5em; font-weight:bold; color:#8b0000;">${g.displayId}</div>
                <div>${g.name || '名前なし'} 様 (${g.adults}名)</div>
                <button class="btn-call" onclick="socket.emit('callGuest', {displayId:'${g.displayId}'})">📢 呼出</button>
                <button class="btn-complete" onclick="socket.emit('updateStatus', {displayId:'${g.displayId}', status:'completed'})">✓ 案内完了</button>
            </div>`).join('');
        }
        function playSound() { if (audio) audio.pause(); audio = new Audio('/1772254751_69a2761f6afb8.mp3'); audio.play(); setTimeout(() => { if(audio) audio.pause(); }, 3000); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }, 1000);
    </script>
</body>
</html>
