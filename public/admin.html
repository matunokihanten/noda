<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>松乃木飯店 管理</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #667eea; height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-size: 13px; }
        
        /* 統計エリア：一行で収まるよう極小化 */
        .stats-strip { display: flex; background: white; padding: 4px; gap: 4px; flex-shrink: 0; overflow-x: auto; }
        .stat-item { background: #f0f0f0; padding: 4px 8px; border-radius: 4px; text-align: center; min-width: 60px; flex: 1; }
        .stat-val { font-weight: bold; color: #8b0000; font-size: 1.2em; display: block; }
        .stat-lbl { font-size: 0.7em; color: #666; }

        /* 設定エリア：一行にトグルを集約 */
        .settings-bar { background: #fff3e0; padding: 4px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid #ddd; }
        .btn-ctrl { padding: 4px 8px; border-radius: 4px; border: none; font-weight: bold; color: white; font-size: 0.85em; }

        /* 待ちリスト：高さを最大化 */
        .list-container { flex: 1; padding: 6px; overflow-y: auto; background: rgba(255,255,255,0.2); }
        .admin-card { background: white; border-radius: 8px; padding: 6px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .admin-card.called { background: #fffbeb; border-left: 6px solid #e67e22; }
        .admin-card.absent { background: #fef2f2; opacity: 0.7; }
        
        .card-info { flex: 1; }
        .card-id { font-weight: bold; font-size: 1.4em; color: #8b0000; margin-right: 8px; }
        .card-meta { font-size: 0.8em; color: #555; }
        .arrival-tag { background: #d35400; color: white; padding: 1px 5px; border-radius: 10px; font-size: 0.75em; font-weight: bold; margin-left: 5px; }

        .card-btns { display: flex; flex-direction: column; gap: 3px; width: 90px; }
        .btn-act { padding: 6px 0; font-size: 0.8em; border-radius: 4px; border: none; font-weight: bold; color: white; }
        .btn-call { background: #f39c12; }
        .btn-done { background: #2ecc71; }
        .btn-abs { background: #e74c3c; }
        
        #clock { font-weight: bold; color: #333; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="stats-strip">
        <div class="stat-item"><span id="qCount" class="stat-val">0</span><span class="stat-lbl">待ち</span></div>
        <div class="stat-item"><span id="webCount" class="stat-val">0</span><span class="stat-lbl" style="color:#9b59b6">ネット</span></div>
        <div class="stat-item"><span id="shopCount" class="stat-val">0</span><span class="stat-lbl" style="color:#3498db">店舗</span></div>
        <div class="stat-item"><span id="allCount" class="stat-val">0</span><span class="stat-lbl">本日計</span></div>
        <div class="stat-item"><span id="doneCount" class="stat-val">0</span><span class="stat-lbl">完了</span></div>
        <div class="stat-item"><span id="avgW" class="stat-val">0</span><span class="stat-lbl">平均分</span></div>
    </div>
    
    <div class="settings-bar">
        <div style="display:flex; align-items:center;">
            <span id="clock">00:00:00</span>
            <input type="checkbox" id="soundOn" checked>🔔
            <input type="range" id="soundLen" min="1" max="5" value="3" style="width:40px;">
        </div>
        <div style="display:flex; gap:4px;">
            <button id="stateBtn" class="btn-ctrl" style="background:#2ecc71;" onclick="toggleAccept()">受付中</button>
            <button class="btn-ctrl" style="background:#95a5a6;" onclick="resetStats()">リセット</button>
        </div>
    </div>

    <div id="list" class="list-container"></div>

    <script>
        const socket = io();
        let lastLen = 0, audio = null, isAccepting = true;

        socket.on('init', d => { updateUI(d); isAccepting = d.isAccepting; updateAcceptUI(); });
        socket.on('update', d => { if (d.queue.length > lastLen && document.getElementById('soundOn').checked) playSound(); lastLen = d.queue.length; updateUI(d); });
        socket.on('statusChange', s => { isAccepting = s.isAccepting; updateAcceptUI(); });

        function updateUI(d) {
            document.getElementById('qCount').innerText = d.queue.length;
            document.getElementById('webCount').innerText = d.stats.totalWebToday || 0;
            document.getElementById('shopCount').innerText = d.stats.totalShopToday || 0;
            document.getElementById('allCount').innerText = d.stats.totalToday;
            document.getElementById('doneCount').innerText = d.stats.completedToday;
            document.getElementById('avgW').innerText = d.stats.averageWaitTime || 0;
            
            document.getElementById('list').innerHTML = d.queue.map(g => `<div class="admin-card ${g.called?'called':''} ${g.absent?'absent':''}">
                <div class="card-info">
                    <span class="card-id">${g.displayId}</span>
                    ${g.targetTime?'<span class="arrival-tag">⏰'+g.targetTime+'</span>':''}
                    <div class="card-meta">
                        <b>${g.name||'名前なし'}</b> 様 (${g.adults}/${g.children}/${g.infants})<br>
                        🪑 ${g.pref} | 🕐 ${g.time}
                    </div>
                </div>
                <div class="card-btns">
                    <button class="btn-act btn-call" onclick="socket.emit('callGuest',{displayId:'${g.displayId}'})">📢 呼出</button>
                    <button class="btn-act btn-done" onclick="socket.emit('updateStatus',{displayId:'${g.displayId}',status:'completed'})">✓ 完了</button>
                    ${g.absent?`<button class="btn-act" style="background:#3498db" onclick="socket.emit('cancelAbsent',{displayId:'${g.displayId}'})">不在解除</button>`:`<button class="btn-act btn-abs" onclick="socket.emit('markAbsent',{displayId:'${g.displayId}'})">不在</button>`}
                </div>
            </div>`).join('');
        }

        function toggleAccept() { socket.emit('setAcceptance', { status: !isAccepting, duration: 0 }); }
        function updateAcceptUI() { const b = document.getElementById('stateBtn'); b.innerText = isAccepting ? "受付中" : "停止中"; b.style.background = isAccepting ? "#2ecc71" : "#e74c3c"; }
        function resetStats() { if(confirm('統計リセット？')) socket.emit('resetStats'); }
        function playSound() { if(audio) audio.pause(); audio = new Audio('/1772254751_69a2761f6afb8.mp3'); audio.loop = true; audio.play(); setTimeout(() => { if(audio) audio.pause(); }, document.getElementById('soundLen').value * 1000); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }, 1000);
    </script>
</body>
</html>
