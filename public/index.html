<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>松乃木飯店 ネット順番待ち</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #fdfaf5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: linear-gradient(135deg, #8b0000 0%, #b91d1d 100%); color: white; padding: 15px; text-align: center; }
        .main-container { display: flex; flex: 1; height: calc(100vh - 80px); }
        .left-panel { width: 420px; padding: 20px; border-right: 2px solid #d4b483; overflow-y: auto; background: #fff8f0; }
        .form-box { background: white; padding: 20px; border-radius: 20px; border: 2px solid #d4b483; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="text"], input[type="time"] { padding: 12px; margin: 8px 0 15px; width: 100%; font-size: 1.1em; border: 2px solid #ddd; border-radius: 10px; }
        .control-label { font-size: 0.95em; font-weight: bold; color: #333; display: block; }
        .btn-submit { background: #8b0000; color: white; border: none; padding: 20px; width: 100%; font-size: 1.3em; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .queue-card { border: 2px solid #d4b483; border-radius: 12px; padding: 10px; text-align: center; background: white; margin-bottom: 5px; }
        .queue-card.my-number { border: 4px solid #8b0000; }
        .complete-id { font-size: 5em; color: #8b0000; font-weight: bold; text-align: center; margin: 20px 0; }
        .call-notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #e67e22; color: white; padding: 30px; border-radius: 20px; display: none; z-index: 10000; }
    </style>
</head>
<body>
    <header><h1>🏮 松乃木飯店</h1><div>ネット順番待ち受付</div></header>
    <div id="callNotification" class="call-notification"><h2>📢 お呼び出しです</h2><button onclick="closeCallNotification()" style="width:100%; padding:10px; margin-top:10px;">確認</button></div>
    <div class="main-container">
        <div class="left-panel">
            <div id="formArea" class="form-box">
                <label class="control-label">📝 お名前 (任意)</label>
                <input type="text" id="nameInput" placeholder="お名前" maxlength="20">
                
                <label class="control-label">⏰ 到着予定時間 (10分刻み)</label>
                <input type="time" id="targetTimeInput" step="600">

                <div style="margin:20px 0; text-align:center;">
                    <label class="control-label">👨‍👩‍👧‍👦 大人 (中学生以上)</label>
                    <button onclick="changeNum('adults', -1)" style="padding:10px;">-</button>
                    <span id="display-adults" style="font-size:2em; font-weight:bold; margin:0 15px;">2</span>
                    <button onclick="changeNum('adults', 1)" style="padding:10px;">+</button>
                </div>
                
                <button class="btn-submit" onclick="send()">✓ 受付確定</button>
            </div>
            <div id="ticketArea" class="form-box" style="display:none; border:3px solid #8b0000;">
                <p style="color:#27ae60; text-align:center; font-weight:bold;">✅ 受付完了</p>
                <div id="num" class="complete-id">--</div>
                <button class="btn-submit" style="background:#e74c3c;" onclick="cancelMyReservation()">✖ 予約をキャンセルする</button>
                <button class="btn-submit" onclick="location.reload()" style="background:#666; margin-top:10px;">戻る</button>
            </div>
        </div>
        <div class="right-panel" style="flex:1; padding:20px; overflow-y:auto; background:white;">
            <h2>📋 待ち状況</h2><div id="queueList"></div>
        </div>
    </div>
    <script>
        const socket = io();
        let nums = { adults: 2, children: 0, infants: 0 }, myNumber = null, soundEnabled = false;

        function changeNum(k, s) { nums[k] = Math.max(k==='adults'?1:0, nums[k]+s); document.getElementById('display-'+k).innerText = nums[k]; }
        socket.on('init', d => updateQueue(d));
        socket.on('update', d => updateQueue(d));
        socket.on('guestCalled', d => { if (d.displayId === myNumber) showCallNotification(); });

        function updateQueue(d) {
            const list = document.getElementById('queueList');
            list.innerHTML = d.queue.map(g => `<div class="queue-card ${g.displayId===myNumber?'my-number':''}">
                <b>${g.displayId}</b> (${g.adults}名) ${g.targetTime?'[予定:'+g.targetTime+']':''}
            </div>`).join('');
        }

        function send() {
            soundEnabled = true; 
            const ctx = new (window.AudioContext || window.webkitAudioContext)(); ctx.resume();
            if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            const targetTime = document.getElementById('targetTimeInput').value;
            socket.emit('register', { type: 'web', ...nums, pref: 'どこでも', name: document.getElementById('nameInput').value.trim(), targetTime });
        }

        function cancelMyReservation() {
            if (confirm('キャンセルしますか？')) { socket.emit('cancelReservation', { displayId: myNumber }); location.reload(); }
        }

        function showCallNotification() {
            document.getElementById('callNotification').style.display = 'block';
            if (soundEnabled && window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(myNumber.replace('-', '番') + 'のお客様、順番です。');
                utterance.lang = 'ja-JP'; window.speechSynthesis.speak(utterance);
            }
        }
        function closeCallNotification() { document.getElementById('callNotification').style.display = 'none'; }
        socket.on('registered', g => {
            myNumber = g.displayId; document.getElementById('formArea').style.display = 'none';
            document.getElementById('ticketArea').style.display = 'block'; document.getElementById('num').innerText = g.displayId;
        });
    </script>
</body>
</html>
